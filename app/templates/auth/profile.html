{% extends "base.html" %}

{% block title %}Profil — smart-home-app{% endblock %}
{% block page_title %}Profil & Einstellungen{% endblock %}

{% block content %}

<div class="max-w-lg space-y-6">

    <!-- Profile card -->
    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h2 class="text-base font-semibold text-gray-700 mb-4">Mein Profil</h2>
        <div class="space-y-3 text-sm">
            <div class="flex justify-between">
                <span class="text-gray-500">E-Mail</span>
                <span class="font-medium" id="profile-email">—</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-500">Name</span>
                <span class="font-medium" id="profile-name">—</span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-500">Rolle</span>
                <span class="font-medium" id="profile-role">—</span>
            </div>
        </div>
    </div>

    <!-- Change password card -->
    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h2 class="text-base font-semibold text-gray-700 mb-4">Passwort ändern</h2>
        <form id="change-password-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Aktuelles Passwort</label>
                <input type="password" name="current_password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Neues Passwort</label>
                <input type="password" name="new_password" required minlength="8"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg">
                Passwort speichern
            </button>
        </form>
    </div>

    <!-- Logout -->
    <button
        onclick="logout()"
        class="w-full text-sm text-red-500 hover:text-red-700 font-medium py-2 border border-red-200 rounded-xl hover:bg-red-50 transition-colors"
    >
        Abmelden
    </button>

</div>

{% endblock %}

{% block scripts %}
<script>
async function loadProfile() {
    const token = localStorage.getItem("access_token") || "";
    const resp = await fetch("/api/v1/users/me", {
        headers: { Authorization: `Bearer ${token}` }
    });
    if (resp.ok) {
        const user = await resp.json();
        document.getElementById("profile-email").textContent = user.email;
        document.getElementById("profile-name").textContent = user.full_name || "—";
        document.getElementById("profile-role").textContent = user.role;
    }
}

async function logout() {
    await fetch("/api/v1/auth/logout", { method: "POST" });
    localStorage.removeItem("access_token");
    window.location.href = "/login";
}

document.getElementById("change-password-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    const resp = await fetch("/api/v1/users/me/password", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${localStorage.getItem("access_token") || ""}`,
        },
        body: JSON.stringify(data),
    });
    alert(resp.ok ? "Passwort geändert." : "Fehler beim Ändern des Passworts.");
});

document.addEventListener("DOMContentLoaded", loadProfile);
</script>
{% endblock %}
