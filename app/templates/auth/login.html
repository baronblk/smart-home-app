<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — smart-home-app</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm mx-auto">

    <!-- Logo / App name -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">SmartHome</h1>
        <p class="text-slate-500 text-sm mt-1">Melden Sie sich an</p>
    </div>

    <!-- Login form -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">

        <div id="login-error" class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"></div>

        <form id="login-form" class="space-y-5">

            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">
                    E-Mail-Adresse
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    autocomplete="email"
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                           placeholder:text-slate-400"
                    placeholder="admin@example.com"
                />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">
                    Passwort
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                />
            </div>

            <button
                type="submit"
                id="login-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium
                       py-2.5 px-4 rounded-lg transition-colors text-sm disabled:bg-blue-400"
            >
                Anmelden
            </button>

        </form>
    </div>

</div>

<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("login-error");
    const btn = document.getElementById("login-btn");
    errorEl.classList.add("hidden");
    btn.disabled = true;
    btn.textContent = "Anmelden...";

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const resp = await fetch("/api/v1/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
        });

        if (resp.ok) {
            const data = await resp.json();
            localStorage.setItem("access_token", data.access_token);
            // Redirect to originally requested page or dashboard
            const redirect = new URLSearchParams(window.location.search).get("next") || "/";
            window.location.href = redirect;
        } else {
            const errData = await resp.json().catch(() => null);
            errorEl.textContent = errData?.detail || "Ungültige Anmeldedaten.";
            errorEl.classList.remove("hidden");
        }
    } catch (err) {
        errorEl.textContent = "Verbindungsfehler. Bitte versuche es erneut.";
        errorEl.classList.remove("hidden");
    } finally {
        btn.disabled = false;
        btn.textContent = "Anmelden";
    }
});
</script>

</body>
</html>
