# ============================================================
# smart-home-app — Docker Compose (development / staging)
# Usage:
#   docker-compose up --build          # start all services
#   docker-compose --profile production up  # include nginx
# ============================================================

services:

  # ----------------------------------------------------------
  # Application — FastAPI
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot-reload: mount app source (dev only, not in prod)
      - ./app:/app/app
      - ./migrations:/app/migrations
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --log-level ${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ----------------------------------------------------------
  # Database — PostgreSQL
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smarthome}
      POSTGRES_USER: ${POSTGRES_USER:-smarthome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
    ports:
      - "5432:5432"   # Exposed for local dev tools (e.g. pgAdmin, DBeaver)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smarthome} -d ${POSTGRES_DB:-smarthome}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ----------------------------------------------------------
  # Cache / Message Queue — Redis
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"   # Exposed for local dev inspection
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ----------------------------------------------------------
  # Reverse Proxy — Nginx (production profile only)
  # Activate with: docker-compose --profile production up
  # ----------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./app/static:/app/static:ro
      # Mount SSL certs in production: ./certs:/etc/nginx/ssl:ro
    profiles:
      - production
    restart: unless-stopped

# ----------------------------------------------------------
# Named volumes
# ----------------------------------------------------------
volumes:
  postgres_data:
    driver: local
