# ============================================================
# CI Workflow — smart-home-app
#
# Runs on every push to main and on all pull requests.
# Jobs: lint → typecheck → test → docker-build
#
# Full implementation added in Phase 9 (CI/CD).
# This stub validates the workflow file structure.
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------
  # Lint — ruff check + ruff format
  # ----------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff check
        run: ruff check app/ tests/ seeds/ scripts/

      - name: Run ruff format check
        run: ruff format --check app/ tests/ seeds/ scripts/

  # ----------------------------------------------------------
  # Type check — mypy
  # ----------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy app/

  # ----------------------------------------------------------
  # Test — pytest with PostgreSQL service container
  # ----------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smarthome_test
          POSTGRES_USER: smarthome
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://smarthome:testpassword@localhost:5432/smarthome_test
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://smarthome:testpassword@localhost:5432/smarthome_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      FRITZ_MOCK_MODE: "true"
      ENVIRONMENT: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ----------------------------------------------------------
  # Docker build — verify the image builds successfully
  # (no push in CI — push happens in release.yml)
  # ----------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: false
          tags: smart-home-app:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
