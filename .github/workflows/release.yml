# ============================================================
# Release Workflow — smart-home-app
#
# Triggered by pushing a semver tag (e.g. v0.1.0).
# Builds a multi-platform Docker image and pushes to GHCR.
#
# Required repository secrets:
#   - GITHUB_TOKEN (automatically provided by GitHub Actions)
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
# ============================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Normalise to lowercase (GHCR requirement)
  IMAGE_NAME_LC: ${{ github.repository_owner }}/smart-home-app

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            # Tag with the full semver: v0.1.0 → 0.1.0
            type=semver,pattern={{version}}
            # Tag with major.minor: v0.1.0 → 0.1
            type=semver,pattern={{major}}.{{minor}}
            # Always update :latest on release
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=smart-home-app
            org.opencontainers.image.description=Production-ready FRITZ!Box smart home controller
            org.opencontainers.image.url=https://github.com/baronblk/smart-home-app

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Image

            ```bash
            docker pull ghcr.io/baronblk/smart-home-app:${{ github.ref_name }}
            ```

            See [docs/deployment.md](docs/deployment.md) for deployment instructions.
